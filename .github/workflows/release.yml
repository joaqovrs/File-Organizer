name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'File Organizer ${{ github.ref_name }}'
          releaseBody: 'Descargá el instalador correspondiente a tu sistema operativo desde los assets de abajo.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # El AppImage bundlea libwayland-*, que choca con el compositor del usuario
      # (pantalla en blanco / EGL_BAD_PARAMETER en Wayland). Las quitamos para que
      # use las del sistema y re-subimos el AppImage corregido a la release.
      - name: Fix AppImage Wayland libs (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          appimage=$(ls *.AppImage | head -1)
          echo "Patching $appimage"
          ./"$appimage" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-server.so.0
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$appimage"
          gh release upload "${GITHUB_REF_NAME}" "$appimage" --clobber --repo "${GITHUB_REPOSITORY}"
